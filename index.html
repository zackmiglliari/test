    }

        transform: translateY(-5px); /* Efeito flutuante ao passar o mouse */
    }
    .info-item .icon {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
    }
    .info-item .number {
        font-size: 2rem;
        font-weight: bold;
        color: #0077b6;
        margin-bottom: 0.5rem;
    }
    .info-item .label {
        font-size: 0.95rem;
        color: #555;
    }
